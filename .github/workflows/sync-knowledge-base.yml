name: Sync Knowledge Base

on:
  workflow_dispatch:
  schedule:
    - cron: "20 18 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Sync Knowledge Base
        run: npm run sync:knowledge-base

      - name: Commit and Push
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add netlify/functions/knowledge-base.js
          git commit -m "chore(sync): update knowledge base from site"
          git push

